{% csrf_token %}
{% for field in form %}
    <div class="mb-3">
        {{ field.label_tag }}
        {{ field }}
        {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
        {% endif %}
        {{ field.errors }}
    </div>
{% endfor %}
{% if form.non_field_errors %}
    {{ form.non_field_errors }}
{% endif %}
