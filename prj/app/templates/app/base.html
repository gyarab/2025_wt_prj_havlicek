<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RunBase{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --runbase-ink: #17212b;
            --runbase-muted: #64748b;
            --runbase-line: #dbe3ea;
            --runbase-green: #1f8a5b;
            --runbase-blue: #2457a6;
            --runbase-bg: #f5f7fa;
        }

        body {
            background: var(--runbase-bg);
            color: var(--runbase-ink);
        }

        .navbar {
            border-bottom: 1px solid rgba(255, 255, 255, .12);
        }

        .brand-mark {
            align-items: center;
            background: #fff;
            border-radius: 6px;
            color: var(--runbase-green);
            display: inline-flex;
            font-weight: 800;
            height: 34px;
            justify-content: center;
            margin-right: .6rem;
            width: 34px;
        }

        .page-shell {
            padding-bottom: 3rem;
            padding-top: 2rem;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--runbase-line);
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, .06);
        }

        .panel-header {
            border-bottom: 1px solid var(--runbase-line);
            padding: 1rem 1.25rem;
        }

        .panel-body {
            padding: 1.25rem;
        }

        .muted {
            color: var(--runbase-muted);
        }

        .btn-primary {
            background: var(--runbase-blue);
            border-color: var(--runbase-blue);
        }

        .btn-success {
            background: var(--runbase-green);
            border-color: var(--runbase-green);
        }

        .table {
            margin-bottom: 0;
        }

        .table th {
            color: var(--runbase-muted);
            font-size: .78rem;
            text-transform: uppercase;
        }

        .metric {
            border-left: 4px solid var(--runbase-green);
            padding: .8rem 1rem;
        }

        .metric strong {
            display: block;
            font-size: 1.8rem;
            line-height: 1;
        }

        label {
            font-weight: 600;
            margin-bottom: .35rem;
        }

        .errorlist {
            color: #b42318;
            margin-bottom: .5rem;
            padding-left: 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <span class="brand-mark">R</span>
            RunBase
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Otevrit menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Prehled</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'races' %}">Behy</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'runners' %}">Bezci</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'results' %}">Vysledky</a></li>
                <li class="nav-item"><a class="nav-link" href="/api/docs">API</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container page-shell">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zavrit"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
